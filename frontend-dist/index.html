<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebClip C2</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body {
        background: #07080f;
        color: #c9d1e8;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        zoom: 1.12;
      }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
      ::-webkit-scrollbar-corner { background: transparent; }

      /* Global animations */
      @keyframes slideUp   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
      @keyframes pulseDot  { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
      @keyframes spinOnce  { to { transform: rotate(360deg); } }
      @keyframes shimmer   { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes glowPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.35); } 60% { box-shadow: 0 0 0 5px rgba(59,130,246,0); } }
      @keyframes recBlink  { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

      /* Input focus ring */
      input:focus, textarea:focus, select:focus { outline: none; border-color: rgba(59,130,246,0.6) !important; }
      input::placeholder, textarea::placeholder { color: rgba(201,209,232,0.22); }

      /* Thin scrollbar for panels */
      .thin-scroll::-webkit-scrollbar { width: 3px; }
      .thin-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

      /* Table hover rows */
      .tbl-row { transition: background 0.08s; }
      .tbl-row:hover { background: rgba(59,130,246,0.04) !important; }

      /* Nav item */
      .nav-item { transition: color 0.1s, background 0.1s; }
      .nav-item:hover { background: rgba(255,255,255,0.04) !important; color: #c9d1e8 !important; }
    </style>
    <script type="module" crossorigin src="/assets/index-CYGrCLXr.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
